<!DOCTYPE html>
<html>
<head>
    <title>Mis etiquetas</title>
</head>

<body>
    Esta <em>palabra</em> tiene enfasis<br>
    Esta <i>palabra</i> está en cursiva<br>
    Esta <strong>palabra</strong> es muy fuerte<br>
    Esta <b>palabra</b> es muy fuere<br>
    Esta <small>palabra</small> es pequeña<br>
    Esta <del>palabra</del> este en negrita<br>
    Esta <ins>palara</ins> está insertada<br>
    Esta <u>palabra</u> esta subrayada<br>
    Esta <mark>palabra</mark> está marcada<br>
</body>

</html>
